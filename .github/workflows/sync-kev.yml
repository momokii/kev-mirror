# =============================================================================
# Sync CISA KEV Catalog
# -----------------------------------------------------------------------------
# Purpose
#   Maintain an in-repo mirror of the CISA Known Exploited Vulnerabilities (KEV)
#   catalog, fetched directly from the authoritative source on cisa.gov.
#
# Why this exists
#   The KEV feed on www.cisa.gov sits behind Akamai's edge protection, which
#   commonly returns HTTP 403 to requests originating from cloud / datacenter IP
#   ranges (regardless of headers or TLS fingerprint). GitHub-hosted runners use
#   IP ranges that are not subject to that block, so they can pull the feed
#   straight from the authoritative origin. Downstream systems (e.g. an n8n
#   workflow on a blocked VM) then read the committed copy from this repo via
#   raw.githubusercontent.com, which is not blocked.
#
# What it does
#   1. Fetches the KEV JSON from cisa.gov (with polite retries).
#   2. Validates that the payload is well-formed and non-empty.
#   3. Warns if the catalog looks stale.
#   4. Commits the file only when its contents actually changed (idempotent).
#
# Output
#   ./known_exploited_vulnerabilities.json  (committed to the default branch)
# =============================================================================

name: Sync CISA KEV Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "5,15,25,35,45,55 * * * *"

jobs:
  scheduled:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Scrape CISA KEV
        run: curl -f --silent --output known_exploited_vulnerabilities.json https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json

      - name: Commit and push if it changed
        run: |-
          git config user.name "kelana"
          git config user.email "kelanachandra7@gmail.com"
          git add -A
          timestamp=$(date -u)
          git commit -m "$(echo -e "Update KEV: $timestamp\n\nSigned-off-by: AboutCode Automation <kelanachandra7@gmail.com>")" || exit 0
          git push
